<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CCPM QA Test Page</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    nav a { margin-right: 10px; }
    .form-group { margin: 10px 0; }
    label { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>Test Page</h1>

  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <section>
    <h2>Actions</h2>
    <button id="btn-submit" type="button">Submit</button>
    <button id="btn-cancel" type="button">Cancel</button>
  </section>

  <section>
    <h2>Form</h2>
    <form id="test-form" action="/submit" method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter email">
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="editor">Editor</option>
        </select>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="agree" name="agree"> I agree to the terms
        </label>
      </div>
      <button type="submit">Send</button>
    </form>
  </section>

  <section>
    <h2>Images</h2>
    <img src="logo.png" alt="Company Logo" width="100" height="100">
    <img src="banner.jpg" alt="Welcome Banner" width="400" height="200">
  </section>

  <footer>
    <p>Test fixture for CCPM QA browser engine</p>
  </footer>
</body>
</html>
